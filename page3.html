<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>QR Code kurdsh</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .box h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .box a {
            display: inline-block;
            padding: 12px 25px;
            margin-top: 15px;
            background-color: #e5b634;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .box a:hover {
            background-color: #ffae00;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Container 1: Social QR Code -->
        <div class="box">
            <h2>QR Code</h2>
            <p>دروستکردنی بۆ ئیمەیڵ، تەلەفۆن، فەیسبووک، واتسئاپ، سناپچات و تیلیگرام.</p>
            <a href="page4.html"> کلیک لەیرە بکە</a>
        </div>

        <!-- Container 2: Wi-Fi QR Code -->
        <div class="box">
            <h2>QR Code  WiFi</h2>
            <p>دروستکردنی ئینتەرنێت .</p>
            <a href="page5.html">  کلیک لەیرە بکە</a>
        </div>
          <!-- Container 2: Wi-Fi QR Code -->
        <div class="box">
            <h2>QR Code  Google Map</h2>
            <p>گۆگڵ ماپ  .</p>
            <a href="page6.html">  کلیک لەیرە بکە</a>
        </div>
    </div>
</body>
</html>
